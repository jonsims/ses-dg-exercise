<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DG Site Selector — Presenter Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <style>
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState, useEffect, useCallback } = React;

// ═══════════════════════════════════════════════════════════════
// FIREBASE CONFIG — Must match the student app's config exactly
// ═══════════════════════════════════════════════════════════════
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyDq-LLCuy-n_6WT-d8SjD3hhrRF0LrS7Yg",
  authDomain: "ses-dg-exercise.firebaseapp.com",
  databaseURL: "https://ses-dg-exercise-default-rtdb.firebaseio.com",
  projectId: "ses-dg-exercise",
  storageBucket: "ses-dg-exercise.firebasestorage.app",
  messagingSenderId: "475047994870",
  appId: "1:475047994870:web:f24d1ff0c88fec5d9dd3d7"
};

let db = null;
try {
  const app = firebase.initializeApp(FIREBASE_CONFIG);
  db = firebase.database();
} catch (e) {
  console.warn("Firebase not configured.", e.message);
}

const CLASS_SIZE = 45;

// ─── Neighborhood reference data (must match student app) ────
const NEIGHBORHOODS = [
  { id: 1, name: "South Memphis", state: "TN", profitScore: 82, hasLocalGrocer: false, isFoodDesert: true, communityImpact: { grocerCloses: false, produceSpendingChange: -8.2, foodDesertStays: true } },
  { id: 2, name: "Whitehaven", state: "TN", profitScore: 74, hasLocalGrocer: true, isFoodDesert: false, communityImpact: { grocerCloses: true, produceSpendingChange: -13.8, foodDesertStays: true } },
  { id: 3, name: "Midtown Memphis", state: "TN", profitScore: 41, hasLocalGrocer: true, isFoodDesert: false, communityImpact: { grocerCloses: false, produceSpendingChange: -2.1, foodDesertStays: false } },
  { id: 4, name: "Marks", state: "MS", profitScore: 88, hasLocalGrocer: false, isFoodDesert: true, communityImpact: { grocerCloses: false, produceSpendingChange: -18.4, foodDesertStays: true } },
  { id: 5, name: "Orange Mound", state: "TN", profitScore: 71, hasLocalGrocer: false, isFoodDesert: true, communityImpact: { grocerCloses: false, produceSpendingChange: -6.5, foodDesertStays: true } },
  { id: 6, name: "Itta Bena", state: "MS", profitScore: 79, hasLocalGrocer: false, isFoodDesert: true, communityImpact: { grocerCloses: false, produceSpendingChange: -21.3, foodDesertStays: true } },
  { id: 7, name: "Germantown", state: "TN", profitScore: 28, hasLocalGrocer: true, isFoodDesert: false, communityImpact: { grocerCloses: false, produceSpendingChange: -0.8, foodDesertStays: false } },
  { id: 8, name: "Ruleville", state: "MS", profitScore: 85, hasLocalGrocer: true, isFoodDesert: false, communityImpact: { grocerCloses: true, produceSpendingChange: -16.2, foodDesertStays: true } },
  { id: 9, name: "Frayser", state: "TN", profitScore: 80, hasLocalGrocer: true, isFoodDesert: false, communityImpact: { grocerCloses: true, produceSpendingChange: -14.1, foodDesertStays: true } },
];

const POLICY_OPTIONS = [
  { id: "produce", label: "Require fresh produce" },
  { id: "buffer", label: "2-mile buffer from grocers" },
  { id: "hire-local", label: "80% local hiring + living wage" },
  { id: "none", label: "No additional constraints" },
];

// ─── Helpers ─────────────────────────────────────────────────

function cn(...args) {
  return args.filter(Boolean).join(" ");
}

function Bar({ label, count, max, color = "bg-teal-500", suffix = "" }) {
  const pct = max > 0 ? (count / max) * 100 : 0;
  return (
    <div className="flex items-center gap-3">
      <div className="w-40 text-sm text-gray-700 text-right truncate">{label}</div>
      <div className="flex-1 bg-gray-200 rounded-full h-8 relative overflow-hidden">
        <div
          className={cn("h-full rounded-full transition-all duration-700", color)}
          style={{ width: `${Math.max(pct, 0)}%` }}
        />
        <div className="absolute inset-0 flex items-center justify-center text-sm font-bold text-gray-900">
          {count}{suffix}
        </div>
      </div>
    </div>
  );
}

// ─── Reveal Section wrapper ─────────────────────────────────

function RevealSection({ title, revealed, onReveal, children }) {
  return (
    <div className="bg-white rounded-xl border border-gray-300 overflow-hidden">
      <div className="flex items-center justify-between px-6 py-4 border-b border-gray-200">
        <h2 className="text-lg font-bold text-gray-900">{title}</h2>
        {!revealed && (
          <button
            onClick={onReveal}
            className="px-5 py-2 bg-teal-600 hover:bg-teal-500 text-white font-semibold rounded-lg text-sm transition-colors"
          >
            Reveal
          </button>
        )}
        {revealed && (
          <span className="px-3 py-1 bg-teal-100 text-teal-700 rounded-full text-xs font-medium">Visible</span>
        )}
      </div>
      {revealed && (
        <div className="px-6 py-5">
          {children}
        </div>
      )}
    </div>
  );
}

// ─── Main Presenter Dashboard ───────────────────────────────

function PresenterDashboard() {
  const [submissions, setSubmissions] = useState({});
  const [revealed, setRevealed] = useState({
    counter: true,
    neighborhoods: false,
    predictions: false,
    policy: false,
  });

  useEffect(() => {
    if (!db) return;
    const ref = db.ref('submissions');
    ref.on('value', (snap) => {
      setSubmissions(snap.val() || {});
    });
    return () => ref.off();
  }, []);

  const entries = Object.values(submissions);
  const totalSubmissions = entries.length;

  // ─── Neighborhood pick counts ───
  const pickCounts = {};
  NEIGHBORHOODS.forEach(n => { pickCounts[n.id] = 0; });
  entries.forEach(e => {
    if (e.selected) e.selected.forEach(id => { pickCounts[id] = (pickCounts[id] || 0) + 1; });
  });
  const sortedNeighborhoods = [...NEIGHBORHOODS].sort((a, b) => pickCounts[b.id] - pickCounts[a.id]);
  const maxPicks = Math.max(...Object.values(pickCounts), 1);

  // ─── Most common combo ───
  const comboCounts = {};
  entries.forEach(e => {
    if (e.selected && e.selected.length === 3) {
      const key = [...e.selected].sort((a,b) => a - b).join(',');
      comboCounts[key] = (comboCounts[key] || 0) + 1;
    }
  });
  const topCombo = Object.entries(comboCounts).sort((a, b) => b[1] - a[1])[0];
  const topComboNames = topCombo
    ? topCombo[0].split(',').map(id => NEIGHBORHOODS.find(n => n.id === parseInt(id))).filter(Boolean).map(n => n.name)
    : [];

  // ─── DG algorithm picks (top 3 by profit) ───
  const dgPicks = [...NEIGHBORHOODS].sort((a, b) => b.profitScore - a.profitScore).slice(0, 3);

  // ─── Prediction accuracy per neighborhood ───
  const predictionStats = {};
  NEIGHBORHOODS.forEach(n => {
    predictionStats[n.id] = { grocerTotal: 0, grocerCorrect: 0, produceTotal: 0, produceCorrect: 0 };
  });
  entries.forEach(e => {
    if (!e.predictions || !e.selected) return;
    e.selected.forEach(id => {
      const pred = e.predictions[id];
      const n = NEIGHBORHOODS.find(x => x.id === id);
      if (!pred || !n) return;

      if (n.hasLocalGrocer && pred.grocerCloses !== undefined) {
        predictionStats[id].grocerTotal++;
        if (pred.grocerCloses === n.communityImpact.grocerCloses) predictionStats[id].grocerCorrect++;
      }

      if (pred.produceDirection) {
        predictionStats[id].produceTotal++;
        const actualDrop = Math.abs(n.communityImpact.produceSpendingChange);
        const actualCat = actualDrop > 15 ? "drops-big" : actualDrop > 5 ? "drops-some" : "stable";
        if (pred.produceDirection === actualCat) predictionStats[id].produceCorrect++;
      }
    });
  });

  // ─── Policy distribution ───
  const policyCounts = {};
  POLICY_OPTIONS.forEach(p => { policyCounts[p.id] = 0; });
  entries.forEach(e => {
    if (e.policy) policyCounts[e.policy] = (policyCounts[e.policy] || 0) + 1;
  });
  const maxPolicy = Math.max(...Object.values(policyCounts), 1);
  const totalPolicyVotes = Object.values(policyCounts).reduce((a, b) => a + b, 0);

  const reveal = (key) => setRevealed(prev => ({ ...prev, [key]: true }));
  const revealAll = () => setRevealed({ counter: true, neighborhoods: true, predictions: true, policy: true });
  const hideAll = () => setRevealed({ counter: true, neighborhoods: false, predictions: false, policy: false });

  const loadDummyData = () => {
    if (!db) return;
    const policies = ["produce", "buffer", "hire-local", "none"];
    const produceOpts = ["drops-big", "drops-some", "stable"];
    const ids = NEIGHBORHOODS.map(n => n.id);
    const updates = {};
    for (let i = 0; i < CLASS_SIZE; i++) {
      const shuffled = [...ids].sort(() => Math.random() - 0.5);
      const sel = shuffled.slice(0, 3);
      const preds = {};
      sel.forEach(id => {
        const n = NEIGHBORHOODS.find(x => x.id === id);
        preds[id] = {
          grocerCloses: Math.random() > 0.5,
          produceDirection: produceOpts[Math.floor(Math.random() * 3)],
        };
      });
      updates['dummy_' + i] = {
        selected: sel,
        predictions: preds,
        policy: policies[Math.floor(Math.random() * policies.length)],
        timestamp: Date.now(),
      };
    }
    db.ref('submissions').update(updates);
  };

  const clearData = () => {
    if (db && confirm('Clear all submissions (including dummy data)? This cannot be undone.')) {
      db.ref('submissions').remove();
    }
  };

  const policyColors = {
    produce: "bg-emerald-500",
    buffer: "bg-blue-500",
    "hire-local": "bg-amber-500",
    none: "bg-red-500",
  };

  return (
    <div className="min-h-screen bg-gray-100 text-gray-900">
      {/* Header */}
      <div className="bg-white border-b border-gray-200 px-6 py-4">
        <div className="max-w-5xl mx-auto flex items-center justify-between">
          <div>
            <h1 className="font-bold text-xl">DG Site Selector <span className="text-teal-600">Presenter Dashboard</span></h1>
            <p className="text-gray-500 text-sm">Real-time class results</p>
          </div>
          <div className="flex gap-2">
            <button onClick={revealAll} className="px-4 py-2 bg-teal-600 hover:bg-teal-500 text-white rounded-lg text-sm font-medium transition-colors">
              Reveal All
            </button>
            <button onClick={hideAll} className="px-4 py-2 bg-gray-200 hover:bg-gray-300 text-gray-700 rounded-lg text-sm font-medium transition-colors">
              Hide All
            </button>
            <button
              onClick={loadDummyData}
              className="px-4 py-2 bg-purple-100 hover:bg-purple-200 text-purple-700 rounded-lg text-sm font-medium transition-colors"
            >
              Load Dummy Data
            </button>
            <button
              onClick={clearData}
              className="px-4 py-2 bg-red-100 hover:bg-red-200 text-red-700 rounded-lg text-sm font-medium transition-colors"
            >
              Clear Data
            </button>
          </div>
        </div>
      </div>

      <div className="max-w-5xl mx-auto px-6 py-6 space-y-6">
        {/* ─── Submission Counter (always visible) ─── */}
        <div className="bg-white rounded-xl border border-gray-300 p-6">
          <div className="flex items-center justify-between">
            <div>
              <h2 className="text-lg font-bold text-gray-900">Submissions</h2>
              <p className="text-gray-500 text-sm">Students who have completed selections and predictions</p>
            </div>
            <div className="text-right">
              <div className="text-5xl font-bold text-teal-600">{totalSubmissions}</div>
              <div className="text-gray-500 text-sm">of {CLASS_SIZE} students</div>
            </div>
          </div>
          <div className="mt-4 bg-gray-200 rounded-full h-4 overflow-hidden">
            <div
              className="h-full bg-teal-500 rounded-full transition-all duration-700"
              style={{ width: `${Math.min((totalSubmissions / CLASS_SIZE) * 100, 100)}%` }}
            />
          </div>
          {totalSubmissions === 0 && db && (
            <p className="text-amber-600 text-sm mt-3">Waiting for students to submit...</p>
          )}
          {!db && (
            <p className="text-red-600 text-sm mt-3">Firebase not configured. Replace the FIREBASE_CONFIG in this file with your project credentials.</p>
          )}
        </div>

        {/* ─── Neighborhood Picks ─── */}
        <RevealSection
          title="Which Neighborhoods Did the Class Pick?"
          revealed={revealed.neighborhoods}
          onReveal={() => reveal('neighborhoods')}
        >
          <div className="space-y-3">
            {sortedNeighborhoods.map((n) => (
              <Bar
                key={n.id}
                label={`${n.name}, ${n.state}`}
                count={pickCounts[n.id]}
                max={totalSubmissions}
                color={dgPicks.some(d => d.id === n.id) ? "bg-amber-500" : "bg-teal-500"}
                suffix={` (${totalSubmissions > 0 ? Math.round((pickCounts[n.id] / totalSubmissions) * 100) : 0}%)`}
              />
            ))}
          </div>
          <div className="mt-4 flex items-center gap-4 text-xs text-gray-500">
            <span className="flex items-center gap-1"><span className="w-3 h-3 rounded bg-teal-500 inline-block" /> Student picks</span>
            <span className="flex items-center gap-1"><span className="w-3 h-3 rounded bg-amber-500 inline-block" /> Also DG algorithm's top 3</span>
          </div>

          {topCombo && (
            <div className="mt-5 bg-gray-50 rounded-lg p-4 border border-gray-200">
              <div className="text-sm font-medium text-gray-700">Most common 3-pick combination:</div>
              <div className="text-lg font-bold text-gray-900 mt-1">
                {topComboNames.join(", ")}
                <span className="text-sm font-normal text-gray-500 ml-2">({topCombo[1]} student{topCombo[1] !== 1 ? 's' : ''})</span>
              </div>
              <div className="text-sm text-gray-600 mt-1">
                DG algorithm picks: <strong className="text-amber-600">{dgPicks.map(n => n.name).join(", ")}</strong>
              </div>
            </div>
          )}
        </RevealSection>

        {/* ─── Prediction Accuracy ─── */}
        <RevealSection
          title="How Well Did the Class Predict Outcomes?"
          revealed={revealed.predictions}
          onReveal={() => reveal('predictions')}
        >
          <div className="space-y-4">
            {NEIGHBORHOODS.filter(n => pickCounts[n.id] > 0).sort((a, b) => pickCounts[b.id] - pickCounts[a.id]).map(n => {
              const stats = predictionStats[n.id];
              const grocerPct = stats.grocerTotal > 0 ? Math.round((stats.grocerCorrect / stats.grocerTotal) * 100) : null;
              const producePct = stats.produceTotal > 0 ? Math.round((stats.produceCorrect / stats.produceTotal) * 100) : null;

              return (
                <div key={n.id} className="bg-gray-50 rounded-lg p-4 border border-gray-200">
                  <div className="flex items-center justify-between mb-2">
                    <h3 className="font-bold text-gray-900">{n.name}, {n.state}</h3>
                    <span className="text-xs text-gray-500">{pickCounts[n.id]} student{pickCounts[n.id] !== 1 ? 's' : ''} picked this</span>
                  </div>
                  <div className="grid grid-cols-2 gap-4">
                    {n.hasLocalGrocer && (
                      <div>
                        <div className="text-xs text-gray-500 mb-1">
                          Grocer {n.communityImpact.grocerCloses ? "closes" : "survives"} (actual)
                        </div>
                        {grocerPct !== null ? (
                          <div className="flex items-center gap-2">
                            <div className="flex-1 bg-gray-200 rounded-full h-6 relative overflow-hidden">
                              <div
                                className={cn("h-full rounded-full transition-all duration-700", grocerPct >= 50 ? "bg-emerald-500" : "bg-red-400")}
                                style={{ width: `${grocerPct}%` }}
                              />
                              <div className="absolute inset-0 flex items-center justify-center text-xs font-bold text-gray-900">
                                {grocerPct}% predicted correctly
                              </div>
                            </div>
                          </div>
                        ) : (
                          <div className="text-xs text-gray-400">No predictions yet</div>
                        )}
                      </div>
                    )}
                    <div>
                      <div className="text-xs text-gray-500 mb-1">
                        Produce spending {n.communityImpact.produceSpendingChange > -5 ? "stable" : n.communityImpact.produceSpendingChange > -15 ? "drops some" : "drops a lot"} (actual: {n.communityImpact.produceSpendingChange}%)
                      </div>
                      {producePct !== null ? (
                        <div className="flex items-center gap-2">
                          <div className="flex-1 bg-gray-200 rounded-full h-6 relative overflow-hidden">
                            <div
                              className={cn("h-full rounded-full transition-all duration-700", producePct >= 50 ? "bg-emerald-500" : "bg-red-400")}
                              style={{ width: `${producePct}%` }}
                            />
                            <div className="absolute inset-0 flex items-center justify-center text-xs font-bold text-gray-900">
                              {producePct}% predicted correctly
                            </div>
                          </div>
                        </div>
                      ) : (
                        <div className="text-xs text-gray-400">No predictions yet</div>
                      )}
                    </div>
                  </div>
                </div>
              );
            })}
            {NEIGHBORHOODS.filter(n => pickCounts[n.id] > 0).length === 0 && (
              <p className="text-gray-500 text-sm">No submissions yet.</p>
            )}
          </div>
        </RevealSection>

        {/* ─── Policy Preferences ─── */}
        <RevealSection
          title="What Would the Class Do Differently?"
          revealed={revealed.policy}
          onReveal={() => reveal('policy')}
        >
          <div className="space-y-3">
            {POLICY_OPTIONS.map(p => (
              <Bar
                key={p.id}
                label={p.label}
                count={policyCounts[p.id]}
                max={totalSubmissions}
                color={policyColors[p.id]}
                suffix={totalPolicyVotes > 0 ? ` (${Math.round((policyCounts[p.id] / totalPolicyVotes) * 100)}%)` : ""}
              />
            ))}
          </div>
          {totalPolicyVotes === 0 && (
            <p className="text-gray-500 text-sm mt-3">Students haven't reached the policy section yet.</p>
          )}
          {totalPolicyVotes > 0 && (
            <div className="mt-4 text-sm text-gray-600">
              {totalPolicyVotes} of {totalSubmissions} students have chosen a policy
              ({totalSubmissions - totalPolicyVotes > 0 ? `${totalSubmissions - totalPolicyVotes} still deciding` : "all done"})
            </div>
          )}
        </RevealSection>

        {/* Footer */}
        <div className="text-center text-xs text-gray-400 py-4">
          DG Site Selector — Presenter Dashboard · Data refreshes in real-time
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(
  React.createElement(PresenterDashboard),
  document.getElementById("root")
);
  </script>
</body>
</html>
