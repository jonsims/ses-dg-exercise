// ─── Utility ────────────────────────────────────────────
function cn(...classes) {
  return classes.filter(Boolean).join(" ");
}

function formatMoney(n) {
  return "$" + n.toLocaleString();
}

function formatPct(n) {
  return n > 0 ? `+${n.toFixed(1)}%` : `${n.toFixed(1)}%`;
}

// ─── Sort Options ───────────────────────────────────────
const SORT_OPTIONS = [
  { key: "default", label: "Default" },
  { key: "income-asc", label: "Income (low → high)" },
  { key: "income-desc", label: "Income (high → low)" },
  { key: "poverty-desc", label: "Poverty rate (high → low)" },
  { key: "grocery-desc", label: "Grocery distance (far → near)" },
  { key: "traffic-desc", label: "Road traffic (high → low)" },
];

function sortNeighborhoods(items, sortKey) {
  const sorted = [...items];
  switch (sortKey) {
    case "income-asc": return sorted.sort((a, b) => a.medianIncome - b.medianIncome);
    case "income-desc": return sorted.sort((a, b) => b.medianIncome - a.medianIncome);
    case "poverty-desc": return sorted.sort((a, b) => b.povertyRate - a.povertyRate);
    case "grocery-desc": return sorted.sort((a, b) => b.nearestGroceryMi - a.nearestGroceryMi);
    case "traffic-desc": return sorted.sort((a, b) => b.dailyTraffic - a.dailyTraffic);
    default: return sorted;
  }
}

        <button
          key={opt.key}
          onClick={() => onSort(opt.key)}
          className={cn(
            "px-3 py-1 rounded-full text-xs font-medium transition-colors",
            sortKey === opt.key
              ? "bg-teal-200 text-teal-600 ring-1 ring-teal-600"

          )}
          aria-pressed={sortKey === opt.key}
        >
          {opt.label}
        </button>

  );
}

// ─── Prediction Step ────────────────────────────────────

function PredictionStep({ selected, predictions, setPredictions, onSubmit }) {
  const selectedData = NEIGHBORHOODS.filter((n) => selected.includes(n.id));

  const updatePrediction = (id, field, value) => {
    setPredictions((prev) => ({ ...prev, [id]: { ...prev[id], [field]: value } }));
  };

  const allAnswered = selectedData.every(
    (n) => predictions[n.id]?.grocerCloses !== undefined && predictions[n.id]?.produceDirection !== undefined
  );

  return (
    <div className="max-w-4xl mx-auto space-y-6">
      <div className="text-center space-y-2">
        <h2 className="text-2xl font-bold text-gray-900">Before We Reveal the Results...</h2>
        <p className="text-gray-600 text-sm">
          For each community you chose, predict what happens when a new Dollar General opens.
        </p>
      </div>

      {selectedData.map((n) => {
        const pred = predictions[n.id] || {};
        return (
          <div key={n.id} className="bg-white rounded-xl border border-gray-300 p-5 space-y-4">
            <h3 className="font-bold text-gray-900">{n.name}, {n.state}</h3>
            <div className="text-xs text-gray-600">
              Pop: {n.population.toLocaleString()} · Income: {formatMoney(n.medianIncome)} · Poverty: {n.povertyRate}% ·
              Local grocer: {n.hasLocalGrocer ? "Yes" : "None"} · Existing $ stores: {n.existingDollarStores}
            </div>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              {/* Grocer prediction */}
              <fieldset className="space-y-2">
                <legend className="text-sm text-gray-800 font-medium">
                  {n.hasLocalGrocer ? "Will the local grocer survive?" : "Will a new grocer enter the market?"}
                </legend>
                <div className="flex gap-2">
                  {n.hasLocalGrocer ? (
                    <>
                      <button
                        onClick={() => updatePrediction(n.id, "grocerCloses", true)}
                        className={cn(
                          "flex-1 py-2 rounded-lg text-sm font-medium transition-colors",
                          pred.grocerCloses === true ? "bg-red-200 text-red-800 ring-1 ring-red-400" : "bg-gray-200 text-gray-600 hover:bg-gray-300"
                        )}
                      >
                        It closes
                      </button>
                      <button
                        onClick={() => updatePrediction(n.id, "grocerCloses", false)}
                        className={cn(
                          "flex-1 py-2 rounded-lg text-sm font-medium transition-colors",
                          pred.grocerCloses === false ? "bg-emerald-200 text-emerald-800 ring-1 ring-emerald-400" : "bg-gray-200 text-gray-600 hover:bg-gray-300"
                        )}
                      >
                        It survives
                      </button>
                    </>
                  ) : (
                    <>
                      <button
                        onClick={() => updatePrediction(n.id, "grocerCloses", false)}
                        className={cn(
                          "flex-1 py-2 rounded-lg text-sm font-medium transition-colors",
                          pred.grocerCloses === false ? "bg-red-200 text-red-800 ring-1 ring-red-400" : "bg-gray-200 text-gray-600 hover:bg-gray-300"
                        )}
                      >
                        No grocer enters
                      </button>
                      <button
                        onClick={() => updatePrediction(n.id, "grocerCloses", true)}
                        className={cn(
                          "flex-1 py-2 rounded-lg text-sm font-medium transition-colors",
                          pred.grocerCloses === true ? "bg-emerald-200 text-emerald-800 ring-1 ring-emerald-400" : "bg-gray-200 text-gray-600 hover:bg-gray-300"
                        )}
                      >
                        A grocer opens
                      </button>
                    </>
                  )}
                </div>
              </fieldset>

              {/* Produce spending prediction */}
              <fieldset className="space-y-2">
                <legend className="text-sm text-gray-800 font-medium">What happens to fresh produce spending?</legend>
                <div className="flex gap-2">
                  <button
                    onClick={() => updatePrediction(n.id, "produceDirection", "drops-big")}
                    className={cn(
                      "flex-1 py-2 rounded-lg text-xs font-medium transition-colors",
                      pred.produceDirection === "drops-big" ? "bg-red-200 text-red-800 ring-1 ring-red-400" : "bg-gray-200 text-gray-600 hover:bg-gray-300"
                    )}
                  >
                    Drops a lot (&gt;15%)
                  </button>
                  <button
                    onClick={() => updatePrediction(n.id, "produceDirection", "drops-some")}
                    className={cn(
                      "flex-1 py-2 rounded-lg text-xs font-medium transition-colors",
                      pred.produceDirection === "drops-some" ? "bg-amber-200 text-amber-800 ring-1 ring-amber-400" : "bg-gray-200 text-gray-600 hover:bg-gray-300"
                    )}

                    Drops a little (5-15%)

                  <button
                    onClick={() => updatePrediction(n.id, "produceDirection", "stable")}
                    className={cn(
                      "flex-1 py-2 rounded-lg text-xs font-medium transition-colors",
                      pred.produceDirection === "stable" ? "bg-emerald-200 text-emerald-800 ring-1 ring-emerald-400" : "bg-gray-200 text-gray-600 hover:bg-gray-300"

        );
      })}

      <div className="text-center">
        <button
          onClick={onSubmit}
          disabled={!allAnswered}
          className={cn(
            "px-8 py-3 rounded-lg font-semibold text-lg transition-all",
            allAnswered
              ? "bg-teal-600 hover:bg-teal-500 text-gray-900"
              : "bg-gray-200 text-gray-500 cursor-not-allowed"
          )}
        >
          See What Actually Happened →
        </button>
        {!allAnswered && (
          <p className="text-gray-500 text-xs mt-2">Answer all questions to continue</p>
        )}
      </div>
    </div>
  );
}

function PredictionBadge({ n, predictions }) {
  const pred = predictions[n.id];
  if (!pred) return null;
  const actual = n.communityImpact;
  const results = [];

  // Grocer prediction accuracy
  if (n.hasLocalGrocer) {
    const correct = pred.grocerCloses === actual.grocerCloses;
    results.push({ label: correct ? "Grocer prediction correct" : "Grocer prediction wrong", correct });
  }

  // Produce prediction accuracy
  const actualDrop = Math.abs(actual.produceSpendingChange);
  let actualCategory;
  if (actualDrop > 15) actualCategory = "drops-big";
  else if (actualDrop > 5) actualCategory = "drops-some";
  else actualCategory = "stable";
  const produceCorrect = pred.produceDirection === actualCategory;
  results.push({ label: produceCorrect ? "Produce prediction correct" : "Produce prediction wrong", correct: produceCorrect });

  return (
    <div className="flex flex-wrap gap-2 mt-2">
      {results.map((r, i) => (
        <span
          key={i}
          className={cn(
            "px-2 py-0.5 rounded-full text-xs font-medium",
            r.correct ? "bg-emerald-100 text-emerald-700" : "bg-red-100 text-red-600"
          )}
        >
          {r.correct ? "✓" : "✗"} {r.label}
        </span>
      ))}
    </div>
  );
}

  { id: "buffer", label: "No new store within 2 mi of an existing grocer", profitPenalty: -31, communityBenefit: "Protects local grocers from displacement. Caoui et al. (2024) found roughly one independent grocer lost per three dollar stores within a 2-mile radius. But this also blocks dollar stores from their most profitable locations." },

  const [chosenPolicy, setChosenPolicy] = useState(null);
  const selectedData = NEIGHBORHOODS.filter((n) => selected.includes(n.id));

  const chosen = POLICY_OPTIONS.find((p) => p.id === chosenPolicy);

  return (
    <div className="bg-white rounded-xl border border-gray-300 p-6 space-y-5">

        <h3 className="text-lg font-bold text-teal-600 mb-1">What Would You Do Differently?</h3>

        </p>

        {POLICY_OPTIONS.map((opt) => (
          <button
            key={opt.id}
            onClick={() => { setChosenPolicy(opt.id); writeSubmission(sessionId, { policy: opt.id }); }}
            role="radio"
            aria-checked={chosenPolicy === opt.id}
            className={cn(
              "text-left rounded-lg border p-4 transition-all",
              chosenPolicy === opt.id

                : "border-gray-300 bg-gray-50 hover:border-gray-400 cursor-pointer"
            )}
          >
            <div className="text-sm font-medium text-gray-900">{opt.label}</div>
            <div className="text-xs text-gray-600 mt-1">
              Profit impact: <span className={opt.profitPenalty < 0 ? "text-red-600" : "text-gray-600"}>{opt.profitPenalty === 0 ? "None" : `${opt.profitPenalty}%`}</span>
            </div>
          </button>
        ))}
      </div>

      {chosen && (
        <div className="bg-gray-50 rounded-lg p-4 border-l-4 border-teal-500 space-y-3">
          <div className="flex items-center gap-4">
            <div className="text-center">
              <div className="text-2xl font-bold text-amber-600">{baseProfit.toFixed(0)}</div>
              <div className="text-xs text-gray-500">Base profit</div>
            </div>
            <div className="text-gray-500">→</div>
            <div className="text-center">
              <div className="text-2xl font-bold text-teal-600">
                {Math.max(0, baseProfit + (baseProfit * chosen.profitPenalty) / 100).toFixed(0)}
              </div>
              <div className="text-xs text-gray-500">With policy</div>
            </div>
            <div className="text-center">
              <div className={cn("text-2xl font-bold", chosen.profitPenalty < 0 ? "text-red-600" : "text-gray-600")}>
                {chosen.profitPenalty === 0 ? "0%" : `${chosen.profitPenalty}%`}

              <div className="text-xs text-gray-500">Change</div>
            </div>
          </div>
          <p className="text-sm text-gray-800 leading-relaxed">{chosen.communityBenefit}</p>
          {chosen.id !== "none" && (
            <p className="text-xs text-gray-500 italic">
              This is why cities like Tulsa, Fort Worth, and Cleveland have explored similar zoning and requirements.
              The policy question isn't whether DG provides value — it's whether the current model captures too much value
              while externalizing too much cost.
            </p>
          )}
        </div>
      )}
    </div>
  );
}

function Scorecard({ selected, predictions, sessionId }) {
  const selectedData = NEIGHBORHOODS.filter((n) => selected.includes(n.id));
  const totalProfit = selectedData.reduce((sum, n) => sum + n.profitScore, 0);
  const avgProfit = totalProfit / selectedData.length;
  const grocersClosed = selectedData.filter((n) => n.communityImpact.grocerCloses).length;
  const newFoodDeserts = selectedData.filter((n) => !n.isFoodDesert && n.communityImpact.foodDesertStays).length;
  const avgProduceChange = selectedData.reduce((sum, n) => sum + n.communityImpact.produceSpendingChange, 0) / selectedData.length;
  const peopleAffected = selectedData.reduce((sum, n) => sum + n.population, 0);
  const totalJobs = selectedData.reduce((sum, n) => sum + n.dgBrings.jobs, 0);

  // Prediction accuracy
  let correctCount = 0;
  let totalPredictions = 0;
  selectedData.forEach((n) => {
    const pred = predictions[n.id];
    if (!pred) return;
    if (n.hasLocalGrocer) {
      totalPredictions++;
      if (pred.grocerCloses === n.communityImpact.grocerCloses) correctCount++;
    }
    totalPredictions++;
    const actualDrop = Math.abs(n.communityImpact.produceSpendingChange);
    let actualCat = actualDrop > 15 ? "drops-big" : actualDrop > 5 ? "drops-some" : "stable";
    if (pred.produceDirection === actualCat) correctCount++;
  });

  const dgPicks = [...NEIGHBORHOODS].sort((a, b) => b.profitScore - a.profitScore).slice(0, 3);
  const dgAvgProfit = dgPicks.reduce((s, n) => s + n.profitScore, 0) / 3;
  const dgGrocersClosed = dgPicks.filter((n) => n.communityImpact.grocerCloses).length;

  return (
    <div className="space-y-6">
      {/* Your scorecard */}
      <div className="bg-white rounded-xl border border-gray-300 p-6">
        <h3 className="text-lg font-bold text-gray-900 mb-4">Your Scorecard</h3>
        <div className="grid grid-cols-2 md:grid-cols-5 gap-4">
          <div className="text-center">
            <div className="text-3xl font-bold text-green-600">{avgProfit.toFixed(0)}</div>
            <div className="text-xs text-gray-600 mt-1">Avg profit score (illustrative)</div>
          </div>
          <div className="text-center">
            <div className="text-3xl font-bold text-red-600">{grocersClosed}</div>
            <div className="text-xs text-gray-600 mt-1">Grocers closed</div>
          </div>
          <div className="text-center">
            <div className="text-3xl font-bold text-red-600">{newFoodDeserts}</div>
            <div className="text-xs text-gray-600 mt-1">New food deserts</div>
          </div>
          <div className="text-center">
            <div className="text-3xl font-bold text-amber-600">{formatPct(avgProduceChange)}</div>
            <div className="text-xs text-gray-600 mt-1">Avg produce spending</div>
          </div>
          <div className="text-center">
            <div className="text-3xl font-bold text-teal-600">{totalJobs}</div>
            <div className="text-xs text-gray-600 mt-1">Jobs created</div>
          </div>
        </div>
        <div className="mt-4 pt-4 border-t border-gray-300 flex justify-between items-center flex-wrap gap-2">
          <span className="text-gray-600 text-sm">{peopleAffected.toLocaleString()} people affected by your choices</span>
          {totalPredictions > 0 && (
            <span className="text-gray-600 text-sm">
              Your predictions: <strong className={correctCount / totalPredictions >= 0.5 ? "text-emerald-600" : "text-amber-600"}>{correctCount}/{totalPredictions} correct</strong>
            </span>
          )}
        </div>
      </div>

      {/* DG algorithm comparison */}
      <div className="bg-amber-50 rounded-xl border border-amber-300 p-6">
        <h3 className="text-lg font-bold text-amber-700 mb-2">What Dollar General's Algorithm Would Pick</h3>
        <p className="text-amber-600 text-sm mb-4">
          Optimizing purely for profit: <strong>{dgPicks.map((n) => n.name).join(", ")}</strong>
        </p>
        <div className="grid grid-cols-3 gap-4 text-center">
          <div>
            <div className="text-2xl font-bold text-amber-700">{dgAvgProfit.toFixed(0)}</div>
            <div className="text-xs text-amber-600">Avg profit score (illustrative)</div>
          </div>
          <div>
            <div className="text-2xl font-bold text-red-600">{dgGrocersClosed}</div>
            <div className="text-xs text-amber-600">Grocers closed</div>
          </div>
          <div>
            <div className="text-2xl font-bold text-red-600">
              {dgPicks.filter((n) => !n.isFoodDesert && n.communityImpact.foodDesertStays).length}
            </div>
            <div className="text-xs text-amber-600">New food deserts</div>
          </div>
        </div>
      </div>

      {/* Policy redesign */}
      <PolicyRedesign selected={selected} sessionId={sessionId} />

      {/* Structural insight */}
      <div className="bg-white rounded-xl border border-gray-300 p-6">
        <h3 className="text-lg font-bold text-gray-900 mb-3">The Structural Insight</h3>
        <p className="text-gray-800 text-sm leading-relaxed mb-3">
          Notice the pattern: <strong className="text-amber-600">the most profitable locations are always the ones that cause the most community harm.</strong>{" "}
          This isn't a bug in Dollar General's strategy — it's the core logic. Their model depends on:
        </p>
        <ul className="text-gray-800 text-sm space-y-2 ml-4 list-disc">
          <li><strong className="text-gray-900">Low competition</strong> — areas where grocers are already thin-margin or absent</li>
          <li><strong className="text-gray-900">Captive customers</strong> — people without cars or alternatives who must shop what's nearby</li>
          <li><strong className="text-gray-900">High-margin product mix</strong> — shelf-stable processed food, not fresh produce</li>
        </ul>
        <p className="text-gray-800 text-sm leading-relaxed mt-3">
          But the picture is genuinely complex. Dollar General <em>does</em> provide real value: jobs in communities with few employers,
          the cheapest staples within walking distance, and tax revenue for struggling municipalities. The question isn't whether
          dollar stores are "good" or "bad" — it's whether the <strong className="text-teal-600">incentive structure</strong> can
          be redesigned so the business model doesn't require harming the communities it serves.
        </p>
        <p className="text-gray-800 text-sm leading-relaxed mt-3">
          This is what economists call a <strong className="text-teal-600">negative externality</strong>: the health and access
          costs of the business model are borne by the community, not the company. It connects directly to the food security
          framework: Dollar General's location strategy undermines <em>availability</em>, <em>access</em>, and <em>stability</em> simultaneously.
        </p>
        <div className="mt-4 pt-3 border-t border-gray-300">
          <div className="text-xs text-gray-500 space-y-1">
            <p className="font-semibold text-gray-600">References</p>
            <p>Caoui, E. H., Hollenbeck, B., &amp; Osborne, M. (2024). The impact of dollar store expansion on local market structure and food access. <em>Working paper, UCLA Anderson School of Management</em>.</p>
            <p>Feng, Y., Page, E. T., &amp; Cash, S. B. (2023). Dollar stores and food access for rural households in the United States, 2008–2020. <em>American Journal of Public Health, 113</em>(3), 290–298.</p>
            <p>Healy-Aarons, L. (2024, July 2). Study: Dollar stores' entry into rural communities adds to rural grocery challenges. <em>Investigate Midwest</em>.</p>
            <p>Marchesi, K., Steinbach, S., &amp; Lopez, R. A. (2024). Dollar store entry affects rural grocery stores more than urban. <em>Amber Waves</em>, USDA Economic Research Service.</p>
            <p>Shannon, J. (2021). Dollar stores, retailer redlining, and the metropolitan geographies of precarious consumption. <em>Annals of the American Association of Geographers, 111</em>(4), 1200–1218.</p>
            <p>U.S. Census Bureau. (2019). <em>American Community Survey 5-year estimates, 2014–2018</em>.</p>
            <p>U.S. Department of Agriculture, Economic Research Service. (2021). <em>Food Access Research Atlas</em>.</p>
            <p className="mt-2 font-semibold text-gray-600">Note on methodology</p>
            <p>Demographic data is sourced directly from Census ACS and USDA. Community impact projections (produce spending changes, grocer displacement likelihood, profit scores) are illustrative scenarios modeled from patterns described in the above research — not empirical measurements for these specific locations. Produce spending estimates reflect ranges reported across studies, applied to approximate local conditions.</p>
          </div>
        </div>
      </div>
    </div>
  );
}

    </div>
  );
}

// ─── Mount ──────────────────────────────────────────────
ReactDOM.render(
